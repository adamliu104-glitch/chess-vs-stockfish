  <rect x="28" y="58" width="44" height="37" rx="8" fill="#9eaab4"/>
  <!-- Chainmail texture lines -->
  <path d="M 28 65 Q 50 68 72 65 M 28 73 Q 50 76 72 73 M 28 81 Q 50 84 72 81" stroke="#7a8890" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- Tabard (white/green cross) -->
  <rect x="44" y="58" width="12" height="37" fill="white" opacity="0.9"/>
  <rect x="28" y="71" width="44" height="12" fill="white" opacity="0.9"/>
  <path d="M 44 71 L 56 71 L 56 83 L 44 83 Z" fill="#cc2200" opacity="0.8"/>
