  <!-- Helmet crest/ridge -->
  <path d="M 50 12 Q 52 15 54 12 Q 56 9 54 7 Q 52 5 50 7 Q 48 9 46 7 Q 44 5 46 12 Z" fill="#cc2200"/>
  <!-- Plume -->
