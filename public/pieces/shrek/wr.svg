  <circle cx="36" cy="33" r="2" fill="#7a8890"/>
  <circle cx="64" cy="33" r="2" fill="#7a8890"/>
  <!-- Shield on arm (implied) -->
  <ellipse cx="18" cy="72" rx="10" ry="14" fill="#8a9aa4" stroke="#6a7a84" stroke-width="1.5"/>
  <path d="M 14 72 L 22 72" stroke="#5a6a74" stroke-width="1.5"/>
