  <rect x="42" y="50" width="16" height="12" fill="#cc2200"/>
  <!-- Dragon head -->
  <ellipse cx="50" cy="35" rx="28" ry="24" fill="#dd2200"/>
  <!-- Scales pattern -->
  <path d="M 30 30 Q 35 26 40 30 M 40 30 Q 45 26 50 30 M 50 30 Q 55 26 60 30 M 60 30 Q 65 26 70 30" stroke="#bb1a00" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 27 40 Q 32 36 37 40 M 45 40 Q 50 36 55 40 M 63 40 Q 68 36 73 40" stroke="#bb1a00" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Snout / jaw -->
  <path d="M 30 42 Q 50 58 70 42 Q 68 50 50 56 Q 32 50 30 42 Z" fill="#cc2200"/>
  <!-- Teeth -->
  <path d="M 35 46 L 38 52 M 45 48 L 47 54 M 53 48 L 55 54 M 62 46 L 65 52" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Fire breath -->
  <path d="M 50 55 Q 45 65 40 70 Q 50 62 55 72 Q 52 63 60 68 Q 55 58 50 55 Z" fill="#ff8800" opacity="0.85"/>
  <path d="M 50 55 Q 48 60 46 65 Q 50 59 52 64 Z" fill="#ffcc00" opacity="0.9"/>
  <!-- Eyes (glowing yellow) -->
  <ellipse cx="38" cy="28" rx="8" ry="7" fill="#ffcc00"/>
  <ellipse cx="62" cy="28" rx="8" ry="7" fill="#ffcc00"/>
  <ellipse cx="38" cy="28" rx="4" ry="6" fill="#1a0000"/>
  <ellipse cx="62" cy="28" rx="4" ry="6" fill="#1a0000"/>
  <!-- Horns -->
  <path d="M 38 12 Q 32 0 36 -5" stroke="#8b4513" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 62 12 Q 68 0 64 -5" stroke="#8b4513" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 50 10 Q 50 0 50 -3" stroke="#8b4513" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
