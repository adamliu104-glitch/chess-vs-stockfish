<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow -->
  <ellipse cx="50" cy="97" rx="30" ry="5" fill="rgba(0,0,0,0.3)"/>
  <!-- Dragon body/tail base -->
  <path d="M 15 95 Q 30 70 35 60 Q 50 68 65 60 Q 70 70 85 95 Z" fill="#8b1a1a"/>
  <!-- Wings (spread) -->
  <path d="M 38 58 Q 15 45 5 20 Q 20 30 30 45 Q 32 40 38 48 Z" fill="#cc2200" opacity="0.9"/>
  <path d="M 38 65 Q 10 65 3 52 Q 18 58 32 60 Z" fill="#aa1a00" opacity="0.8"/>
  <path d="M 62 58 Q 85 45 95 20 Q 80 30 70 45 Q 68 40 62 48 Z" fill="#cc2200" opacity="0.9"/>
  <path d="M 62 65 Q 90 65 97 52 Q 82 58 68 60 Z" fill="#aa1a00" opacity="0.8"/>
