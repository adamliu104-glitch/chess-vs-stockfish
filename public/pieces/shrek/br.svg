<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow -->
  <ellipse cx="50" cy="97" rx="28" ry="5" fill="rgba(0,0,0,0.3)"/>
  <!-- Black armor body -->
  <rect x="28" y="58" width="44" height="37" rx="8" fill="#2a2a3a"/>
  <!-- Armor plate details -->
  <path d="M 28 65 Q 50 69 72 65 M 28 74 Q 50 78 72 74 M 28 83 Q 50 87 72 83" stroke="#444455" stroke-width="1.5" fill="none"/>
  <!-- Duloc 'D' emblem on chest -->
  <path d="M 42 66 L 42 82 Q 58 82 60 74 Q 62 66 42 66 Z" fill="#cc0000" opacity="0.9"/>
  <path d="M 44 68 L 44 80 Q 56 80 57 74 Q 58 68 44 68 Z" fill="#aa0000"/>
  <!-- Gold shoulder pads -->
  <ellipse cx="30" cy="60" rx="9" ry="6" fill="#c8a000" transform="rotate(-15,30,60)"/>
  <ellipse cx="70" cy="60" rx="9" ry="6" fill="#c8a000" transform="rotate(15,70,60)"/>
  <!-- Gorget -->
  <rect x="40" y="51" width="20" height="10" rx="4" fill="#333345"/>
  <!-- Dark helmet -->
  <ellipse cx="50" cy="35" rx="27" ry="25" fill="#2a2a3a"/>
  <!-- Face plate (menacing) -->
  <rect x="33" y="31" width="34" height="10" rx="3" fill="#111122"/>
  <path d="M 33 36 L 67 36" stroke="#333" stroke-width="1" fill="none"/>
  <!-- Eye slits (red glow) -->
  <rect x="36" y="33" width="10" height="3" rx="1.5" fill="#cc0000"/>
  <rect x="54" y="33" width="10" height="3" rx="1.5" fill="#cc0000"/>
  <!-- Helmet crest (black) -->
  <path d="M 35 22 Q 50 10 65 22" stroke="#444455" stroke-width="5" fill="none"/>
  <path d="M 50 11 L 50 18" stroke="#444455" stroke-width="4"/>
  <!-- Spear/lance tip visible -->
  <line x1="78" y1="10" x2="82" y2="70" stroke="#888" stroke-width="3"/>
  <polygon points="78,4 82,4 80,10" fill="#c8c8c8"/>
</svg>
