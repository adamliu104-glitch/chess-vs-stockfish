<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow -->
  <ellipse cx="50" cy="97" rx="28" ry="5" fill="rgba(0,0,0,0.3)"/>
  <!-- Cape/robe -->
  <path d="M 22 95 L 30 62 Q 50 68 70 62 L 78 95 Z" fill="#8b0000"/>
  <!-- Red tunic / tabard -->
  <rect x="32" y="58" width="36" height="32" rx="8" fill="#aa1010"/>
  <!-- Gold trim -->
  <rect x="32" y="58" width="36" height="5" rx="3" fill="#c8a000"/>
  <rect x="32" y="85" width="36" height="5" rx="3" fill="#c8a000"/>
  <!-- Neck -->
  <rect x="43" y="49" width="14" height="12" fill="#f0c890"/>
  <!-- Head -->
  <ellipse cx="50" cy="37" rx="24" ry="22" fill="#f0c890"/>
  <!-- Bowl-cut hair (iconic Farquaad look) -->
  <path d="M 26 30 Q 28 10 50 8 Q 72 10 74 30 L 68 30 Q 66 18 50 16 Q 34 18 32 30 Z" fill="#1a1a1a"/>
  <!-- Ear tips just visible -->
  <ellipse cx="27" cy="35" rx="4" ry="6" fill="#f0c890"/>
  <ellipse cx="73" cy="35" rx="4" ry="6" fill="#f0c890"/>
  <!-- Eyes (beady, menacing) -->
  <ellipse cx="42" cy="35" rx="5.5" ry="5.5" fill="white"/>
  <ellipse cx="58" cy="35" rx="5.5" ry="5.5" fill="white"/>
  <circle cx="43" cy="36" r="4" fill="#1a0000"/>
  <circle cx="59" cy="36" r="4" fill="#1a0000"/>
  <circle cx="43.5" cy="34.5" r="1.5" fill="white"/>
  <circle cx="59.5" cy="34.5" r="1.5" fill="white"/>
  <!-- Smug/sneering expression -->
  <path d="M 42 46 Q 50 48 58 46" stroke="#c89060" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Thin moustache/stubble hint -->
  <path d="M 44 43 Q 50 45 56 43" stroke="#555" stroke-width="1" fill="none"/>
  <!-- Crown (ornate, larger) -->
  <path d="M 28 12 L 32 2 L 40 10 L 50 0 L 60 10 L 68 2 L 72 12 Z" fill="#FFD700" stroke="#c89000" stroke-width="1.5"/>
  <circle cx="50" cy="2" r="4" fill="#cc0000"/>
  <circle cx="39" cy="10" r="3" fill="#cc0000"/>
  <circle cx="61" cy="10" r="3" fill="#cc0000"/>
  <rect x="26" y="12" width="48" height="8" rx="3" fill="#e8c000" stroke="#c89000" stroke-width="1"/>
  <circle cx="38" cy="16" r="2" fill="#cc0000"/>
  <circle cx="50" cy="16" r="2" fill="#cc0000"/>
  <circle cx="62" cy="16" r="2" fill="#cc0000"/>
</svg>
