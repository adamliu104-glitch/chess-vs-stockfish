<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow -->
  <ellipse cx="50" cy="97" rx="26" ry="5" fill="rgba(0,0,0,0.3)"/>
  <!-- Coat (grey) -->
  <path d="M 20 95 L 30 60 Q 50 67 70 60 L 80 95 Z" fill="#555566"/>
  <rect x="33" y="55" width="34" height="24" rx="7" fill="#666677"/>
  <!-- Collar / lapels -->
  <path d="M 42 55 L 38 50 L 50 58 L 62 50 L 58 55" fill="#444455"/>
  <!-- Neck -->
  <rect x="43" y="46" width="14" height="12" fill="#e8c890"/>
  <!-- Head -->
  <ellipse cx="50" cy="34" rx="22" ry="21" fill="#e8c890"/>
  <!-- ENORMOUS wig (iconic Rumpelstiltskin) -->
  <!-- Main wig mass -->
  <ellipse cx="50" cy="15" rx="30" ry="22" fill="#dddddd"/>
  <ellipse cx="25" cy="25" rx="16" ry="20" fill="#cccccc"/>
  <ellipse cx="75" cy="25" rx="16" ry="20" fill="#cccccc"/>
  <!-- Wig curls -->
  <path d="M 22 18 Q 14 10 18 4 Q 24 12 20 22" stroke="#bbbbbb" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 78 18 Q 86 10 82 4 Q 76 12 80 22" stroke="#bbbbbb" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 30 8 Q 24 0 28 -6 Q 34 4 30 10" stroke="#cccccc" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 70 8 Q 76 0 72 -6 Q 66 4 70 10" stroke="#cccccc" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Eyes (scheming, narrow) -->
  <ellipse cx="42" cy="34" rx="5.5" ry="4" fill="white"/>
  <ellipse cx="58" cy="34" rx="5.5" ry="4" fill="white"/>
  <ellipse cx="42.5" cy="34.5" r="3.5" fill="#1a0000"/>
  <ellipse cx="58.5" cy="34.5" r="3.5" fill="#1a0000"/>
  <circle cx="43.5" cy="33.5" r="1.2" fill="white"/>
  <circle cx="59.5" cy="33.5" r="1.2" fill="white"/>
  <!-- Furrowed brows -->
  <path d="M 37 29 Q 42 26 47 28" stroke="#8b7060" stroke-width="2.5" fill="none"/>
  <path d="M 53 28 Q 58 26 63 29" stroke="#8b7060" stroke-width="2.5" fill="none"/>
  <!-- Large nose -->
  <path d="M 46 38 Q 50 45 54 38" fill="#d4a870" stroke="#c09060" stroke-width="1"/>
  <!-- Sinister grin -->
  <path d="M 41 45 Q 50 52 59 45" stroke="#8b5030" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Contract scroll (Bishop = strategic/magical) -->
  <rect x="60" y="65" width="18" height="25" rx="3" fill="#f5e8c0" transform="rotate(10,65,75)"/>
  <line x1="64" y1="68" x2="74" y2="70" stroke="#888" stroke-width="1.5" transform="rotate(10,65,75)"/>
  <line x1="64" y1="72" x2="74" y2="74" stroke="#888" stroke-width="1.5" transform="rotate(10,65,75)"/>
  <line x1="64" y1="76" x2="74" y2="78" stroke="#888" stroke-width="1.5" transform="rotate(10,65,75)"/>
</svg>
