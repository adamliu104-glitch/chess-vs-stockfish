<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow -->
  <ellipse cx="50" cy="97" rx="22" ry="5" fill="rgba(0,0,0,0.3)"/>
  <!-- Body / grey fur -->
  <rect x="33" y="62" width="34" height="33" rx="9" fill="#888">
  </rect>
  <!-- Red cloak (Big Bad Wolf's disguise) -->
  <path d="M 30 62 Q 25 68 22 80 Q 30 75 33 68 Z" fill="#cc1100" opacity="0.9"/>
  <path d="M 70 62 Q 75 68 78 80 Q 70 75 67 68 Z" fill="#cc1100" opacity="0.9"/>
  <path d="M 33 62 L 30 95 Q 50 98 70 95 L 67 62 Q 50 70 33 62 Z" fill="#cc1100" opacity="0.6"/>
  <!-- Neck fur -->
  <ellipse cx="50" cy="57" rx="14" ry="7" fill="#aaaaaa"/>
  <!-- Wolf head -->
  <ellipse cx="50" cy="38" rx="25" ry="22" fill="#aaaaaa"/>
  <!-- Snout (protruding, wolf-like) -->
  <ellipse cx="50" cy="48" rx="14" ry="10" fill="#cccccc"/>
  <!-- Nose (wolf) -->
  <ellipse cx="50" cy="42" rx="7" ry="5" fill="#222222"/>
  <ellipse cx="50" cy="41" rx="3" ry="2" fill="#444444"/>
  <!-- Nostrils -->
  <ellipse cx="46.5" cy="43" rx="2" ry="2.5" fill="#111"/>
  <ellipse cx="53.5" cy="43" rx="2" ry="2.5" fill="#111"/>
  <!-- Eyes (yellow, menacing) -->
  <ellipse cx="39" cy="33" rx="7" ry="7" fill="#ffdd00"/>
  <ellipse cx="61" cy="33" rx="7" ry="7" fill="#ffdd00"/>
  <ellipse cx="39" cy="33" rx="3" ry="5" fill="#1a0000"/>
  <ellipse cx="61" cy="33" rx="3" ry="5" fill="#1a0000"/>
  <circle cx="39.5" cy="31" r="1.5" fill="white"/>
  <circle cx="61.5" cy="31" r="1.5" fill="white"/>
  <!-- Ears (large, pointed) -->
  <path d="M 30 22 Q 22 4 30 6 L 36 22 Z" fill="#aaaaaa"/>
  <path d="M 31 22 Q 25 8 30 8 L 35 21 Z" fill="#888888"/>
  <path d="M 70 22 Q 78 4 70 6 L 64 22 Z" fill="#aaaaaa"/>
  <path d="M 69 22 Q 75 8 70 8 L 65 21 Z" fill="#888888"/>
  <!-- Teeth / snarl -->
  <path d="M 38 54 Q 50 60 62 54" stroke="#888" stroke-width="2" fill="none"/>
  <rect x="43" y="54" width="5" height="5" rx="1" fill="white"/>
  <rect x="49" y="55" width="4" height="4" rx="1" fill="white"/>
  <rect x="54" y="54" width="5" height="5" rx="1" fill="white"/>
</svg>
